<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini-Proxy Admin Log Viewer 🔍</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Custom scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #111827;
    }
    ::-webkit-scrollbar-thumb {
      background: #374151;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #4b5563;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 flex flex-col h-screen overflow-hidden font-sans">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <i data-lucide="terminal" class="text-indigo-400 w-6 h-6"></i>
      <h1 class="text-lg font-bold tracking-tight">Gemini-Proxy Log Viewer</h1>
      <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded text-xs font-semibold">Local Session</span>
    </div>
    <div class="flex items-center gap-4">
      <button id="toggleSidebarBtn" onclick="toggleSidebar()" class="bg-gray-800 hover:bg-gray-700 text-sm p-1.5 rounded border border-gray-700 transition" title="Toggle Sidebar">
        <i data-lucide="chevron-left" class="w-4 h-4" id="sidebarToggleIcon"></i>
      </button>
      <button onclick="loadLogs()" class="bg-gray-800 hover:bg-gray-700 text-sm px-3 py-1.5 rounded flex items-center gap-2 border border-gray-700 transition">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh
      </button>
    </div>
  </header>

  <!-- Main Split Layout -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar: Log Items List -->
    <aside class="w-80 bg-gray-900 border-r border-gray-800 flex flex-col h-full shrink-0">
      <div class="p-4 border-b border-gray-800">
        <div class="relative">
          <input type="text" id="logSearch" oninput="filterLogs()" placeholder="Filter logs..." class="w-full bg-gray-950 text-sm pl-9 pr-4 py-2 rounded border border-gray-800 focus:outline-none focus:border-indigo-500 text-gray-200">
          <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-500"></i>
        </div>
      </div>
      <div id="logsList" class="flex-1 overflow-y-auto divide-y divide-gray-800/50">
        <div class="p-4 text-center text-gray-500 text-sm">Loading logs...</div>
      </div>
    </aside>

    <!-- Details View: Chrome DevTools Layout -->
    <main class="flex-1 flex flex-col bg-gray-950 overflow-hidden">
      <div id="noSelection" class="flex-1 flex flex-col items-center justify-center text-gray-500 gap-4">
        <i data-lucide="layers" class="w-12 h-12 text-gray-700 animate-pulse"></i>
        <p class="text-sm">Select a transaction log from the sidebar to inspect</p>
      </div>

      <div id="logDetail" class="hidden flex-1 flex flex-col overflow-hidden">

        <!-- Level 1 Tabs: API Selection -->
        <div class="bg-gray-900 border-b border-gray-800 px-6 flex items-center justify-between select-none shrink-0">
          <div class="flex gap-4">
            <button onclick="switchTab('primary', 'claude')" id="tab-primary-claude" class="border-b-2 border-indigo-500 px-1 py-3 text-sm font-semibold text-white">Claude Messages API</button>
            <button onclick="switchTab('primary', 'gemini')" id="tab-primary-gemini" class="border-b-2 border-transparent px-1 py-3 text-sm font-semibold text-gray-400 hover:text-white hover:border-gray-700 transition">Gemini API</button>
            <button onclick="switchTab('primary', 'compare')" id="tab-primary-compare" class="border-b-2 border-transparent px-1 py-3 text-sm font-semibold text-gray-400 hover:text-white hover:border-gray-700 transition">Compare / 对比</button>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500" id="currentLogId">ID: null</span>
          </div>
        </div>

        <!-- Level 2 Tabs: Req vs Res -->
        <div class="bg-gray-900/40 border-b border-gray-800/80 px-6 py-2 flex items-center justify-between shrink-0">
          <div class="flex gap-2 bg-gray-950/80 p-1 rounded-lg border border-gray-800">
            <button onclick="switchTab('direction', 'req')" id="tab-direction-req" class="bg-gray-800 text-xs px-3 py-1 rounded font-medium text-white shadow-sm transition">Request Payload</button>
            <button onclick="switchTab('direction', 'res')" id="tab-direction-res" class="text-xs px-3 py-1 rounded font-medium text-gray-400 hover:text-white transition">Response Payload</button>
          </div>

          <!-- Level 3 Tabs: Preview vs Raw -->
          <div class="flex gap-1">
            <button onclick="switchTab('format', 'preview')" id="tab-format-preview" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-2.5 py-1 rounded font-medium transition flex items-center gap-1">
              <i data-lucide="eye" class="w-3.5 h-3.5"></i> Preview
            </button>
            <button onclick="switchTab('format', 'raw')" id="tab-format-raw" class="bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs px-2.5 py-1 rounded font-medium transition flex items-center gap-1">
              <i data-lucide="code-2" class="w-3.5 h-3.5"></i> Raw
            </button>
            <button onclick="copyCurrentPayload()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs px-2.5 py-1 rounded font-medium transition flex items-center gap-1">
              <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy
            </button>
          </div>
        </div>

        <!-- JSON Display Area -->
        <div class="flex-1 overflow-auto p-6 bg-gray-950 relative">
          <!-- Loading Overlay -->
          <div id="detailLoading" class="absolute inset-0 bg-gray-950/80 flex items-center justify-center hidden">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500"></div>
          </div>

          <!-- Render Container -->
          <div id="payloadContainer" class="font-mono text-sm leading-relaxed"></div>

          <!-- Add Next to it: -->
          <div id="compareContainer" class="hidden flex-1 grid grid-cols-2 gap-6 h-full overflow-hidden min-h-[500px]">
            <!-- Left Side: Claude Client Payload -->
            <div class="flex flex-col border border-gray-800/80 rounded-xl bg-gray-950/40 overflow-hidden h-full">
              <div class="bg-gray-900/60 px-4 py-2 border-b border-gray-800/80 flex items-center justify-between text-xs text-indigo-400 font-bold uppercase select-none shrink-0">
                <span>Claude Payload (Client)</span>
                <span class="text-[10px] text-gray-500 font-mono font-normal">Anthropic Spec</span>
              </div>
              <div id="compareLeftBody" class="flex-1 overflow-auto p-4 font-mono text-xs"></div>
            </div>

            <!-- Right Side: Gemini Upstream Payload -->
            <div class="flex flex-col border border-gray-800/80 rounded-xl bg-gray-950/40 overflow-hidden h-full">
              <div class="bg-gray-900/60 px-4 py-2 border-b border-gray-800/80 flex items-center justify-between text-xs text-emerald-400 font-bold uppercase select-none shrink-0">
                <span>Gemini Payload (Upstream)</span>
                <span class="text-[10px] text-gray-500 font-mono font-normal">Google Spec</span>
              </div>
              <div id="compareRightBody" class="flex-1 overflow-auto p-4 font-mono text-xs"></div>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script>
    let logsList = [];
    let selectedLog = null;
    let selectedLogData = null;

    // Active Navigation State
    let activeTabs = {
      primary: 'claude', // 'claude' or 'gemini'
      direction: 'req',  // 'req' or 'res'
      format: 'preview'  // 'preview' or 'raw'
    };

    // Load initial logs
    async function loadLogs() {
      try {
        const res = await fetch('/admin/api/logs');
        const json = await res.json();
        if (json.success) {
          logsList = json.logs;
          renderLogsList();
        }
      } catch (err) {
        console.error('Failed to load logs:', err);
      }
    }

    function renderLogsList() {
      const container = document.getElementById('logsList');
      if (logsList.length === 0) {
        container.innerHTML = '<div class="p-6 text-center text-gray-500 text-sm">No transaction logs found</div>';
        return;
      }

      container.innerHTML = logsList.map(log => `
        <div onclick="selectLog('${log.id}')" id="log-item-${log.id}" class="p-4 hover:bg-gray-800/40 cursor-pointer border-l-4 border-transparent transition flex flex-col gap-1.5">
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-mono">${log.time}</span>
            <span class="text-[10px] bg-indigo-500/10 text-indigo-300 border border-indigo-500/20 px-1.5 py-0.5 rounded uppercase font-bold tracking-wider">${log.model.split('-').slice(-2).join('-')}</span>
          </div>
          <div class="text-xs font-semibold truncate text-gray-200 font-mono">${log.id}</div>
          <div class="text-[11px] text-gray-500 truncate font-mono">${log.model}</div>
        </div>
      `).join('');

      lucide.createIcons();
      filterLogs();
    }

    function filterLogs() {
      const query = document.getElementById('logSearch').value.toLowerCase();
      logsList.forEach(log => {
        const element = document.getElementById(`log-item-${log.id}`);
        if (!element) return;
        const matches = log.id.toLowerCase().includes(query) || log.model.toLowerCase().includes(query);
        if (matches) {
          element.classList.remove('hidden');
        } else {
          element.classList.add('hidden');
        }
      });
    }

    async function selectLog(id) {
      selectedLog = id;

      // Update sidebar visual selection
      document.querySelectorAll('#logsList > div').forEach(el => {
        el.classList.remove('bg-gray-800/60', 'border-indigo-500');
        el.classList.add('border-transparent');
      });
      const selectedEl = document.getElementById(`log-item-${id}`);
      if (selectedEl) {
        selectedEl.classList.add('bg-gray-800/60', 'border-indigo-500');
      }

      document.getElementById('noSelection').classList.add('hidden');
      document.getElementById('logDetail').classList.remove('hidden');
      document.getElementById('currentLogId').innerText = `ID: ${id}`;
      document.getElementById('detailLoading').classList.remove('hidden');

      try {
        const res = await fetch(`/admin/api/logs/${id}`);
        const json = await res.json();
        if (json.success) {
          selectedLogData = json.data;
          renderPayload();
        }
      } catch (err) {
        console.error('Failed to load log detail:', err);
      } finally {
        document.getElementById('detailLoading').classList.add('hidden');
      }
    }

    function switchTab(level, target) {
      activeTabs[level] = target;

      // Update Tabs Style
      if (level === 'primary') {
        document.querySelectorAll('[id^="tab-primary-"]').forEach(el => {
          el.className = 'border-b-2 border-transparent px-1 py-3 text-sm font-semibold text-gray-400 hover:text-white hover:border-gray-700 transition';
        });
        document.getElementById(`tab-primary-${target}`).className = 'border-b-2 border-indigo-500 px-1 py-3 text-sm font-semibold text-white';
      } else if (level === 'direction') {
        document.querySelectorAll('[id^="tab-direction-"]').forEach(el => {
          el.className = 'text-xs px-3 py-1 rounded font-medium text-gray-400 hover:text-white transition';
        });
        document.getElementById(`tab-direction-${target}`).className = 'bg-gray-800 text-xs px-3 py-1 rounded font-medium text-white shadow-sm transition';
      } else if (level === 'format') {
        document.querySelectorAll('[id^="tab-format-"]').forEach(el => {
          el.className = 'bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs px-2.5 py-1 rounded font-medium transition flex items-center gap-1';
        });
        document.getElementById(`tab-format-${target}`).className = 'bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-2.5 py-1 rounded font-medium transition flex items-center gap-1';
      }

      renderPayload();
    }

    // Toggle Sidebar fold/unfold
    let sidebarCollapsed = false;
    function toggleSidebar() {
      const sidebar = document.querySelector('aside');
      const icon = document.getElementById('sidebarToggleIcon');
      sidebarCollapsed = !sidebarCollapsed;
      if (sidebarCollapsed) {
        sidebar.style.display = 'none';
        icon.setAttribute('data-lucide', 'chevron-right');
      } else {
        sidebar.style.display = 'flex';
        icon.setAttribute('data-lucide', 'chevron-left');
      }
      lucide.createIcons();
    }

    // Adaptive Dual Pane router
    function renderDualPane(targetContainer, payloadObj, channelType) {
      if (!payloadObj) {
        targetContainer.innerHTML = '<div class="text-gray-500 italic py-4">No content recorded for this section</div>';
        return;
      }

      if (activeTabs.format === 'raw') {
        targetContainer.innerHTML = `<pre class="bg-gray-950 p-4 border border-gray-800 rounded-lg text-gray-300 overflow-x-auto text-[11px] whitespace-pre">${JSON.stringify(payloadObj, null, 2)}</pre>`;
      } else {
        const isClaude = isClaudeStream(payloadObj);
        const isGemini = isGeminiStream(payloadObj);

        if (isClaude || isGemini) {
          renderStreamView(targetContainer, payloadObj, isClaude);
        } else {
          // Pass the channelType to createJsonNode to enable contextual highlights!
          targetContainer.appendChild(createJsonNode(null, payloadObj, true, channelType));
        }
      }
    }

    // Identify which nested payload field matches active controls
    function getCurrentPayloadObject() {
      if (!selectedLogData) return null;
      if (activeTabs.primary === 'claude' || activeTabs.primary === 'compare') {
        return activeTabs.direction === 'req' ? selectedLogData.client_req : selectedLogData.claude_res;
      } else {
        return activeTabs.direction === 'req' ? selectedLogData.gem_req : selectedLogData.gem_res;
      }
    }

    // Heuristics
    function isClaudeStream(resArray) {
      if (!Array.isArray(resArray) || resArray.length === 0) return false;
      const firstItem = resArray.find(item => typeof item === 'string' && item.trim().length > 0);
      if (!firstItem) return false;
      const cleaned = firstItem.trim();
      return cleaned.startsWith('event:') || cleaned.startsWith('data:') || cleaned.includes('event:');
    }

    function isGeminiStream(resArray) {
      if (!Array.isArray(resArray) || resArray.length === 0) return false;
      const firstItem = resArray[0];
      return firstItem && typeof firstItem === 'object' && ('candidates' in firstItem || 'promptFeedback' in firstItem);
    }

    // Helper to extract SSE data
    function parseClaudeSSELine(line) {
      const trimmed = line.trim();
      if (!trimmed) return null;

      const result = { event: 'data', data: null };
      const lines = trimmed.split('\n');
      for (const l of lines) {
        if (l.startsWith('event:')) {
          result.event = l.substring(6).trim();
        } else if (l.startsWith('data:')) {
          const jsonStr = l.substring(5).trim();
          try {
            result.data = JSON.parse(jsonStr);
          } catch (e) {
            result.data = jsonStr; // fallback to raw string if not JSON
          }
        }
      }
      return result;
    }

    // Reassemble full text and compile list of stream frame representations
    function compileStreamDetails(arr, isClaude) {
      let mergedText = '';
      const frames = [];

      if (isClaude) {
        arr.forEach((item, index) => {
          if (typeof item !== 'string') return;
          const parsed = parseClaudeSSELine(item);
          if (!parsed) return;

          let snippet = '';
          let typeClass = 'bg-blue-500/10 text-blue-300 border-blue-500/20';

          if (parsed.event === 'content_block_delta' && parsed.data?.delta?.text) {
            const txt = parsed.data.delta.text;
            mergedText += txt;
            snippet = `+ "${txt.replace(/\n/g, '\\n')}"`;
            typeClass = 'bg-emerald-500/10 text-emerald-300 border-emerald-500/20';
          } else if (parsed.data?.completion) {
            // legacy Claude completions text streams
            const txt = parsed.data.completion;
            mergedText += txt;
            snippet = `+ "${txt.replace(/\n/g, '\\n')}"`;
            typeClass = 'bg-emerald-500/10 text-emerald-300 border-emerald-500/20';
          } else {
            snippet = parsed.data?.type || parsed.event;
            typeClass = 'bg-amber-500/10 text-amber-300 border-amber-500/20';
          }

          frames.push({
            index,
            event: parsed.event,
            snippet,
            typeClass,
            payload: parsed.data || parsed
          });
        });
      } else {
        // Gemini
        arr.forEach((item, index) => {
          let snippet = '';
          let typeClass = 'bg-emerald-500/10 text-emerald-300 border-emerald-500/20';

          const partText = item.candidates?.[0]?.content?.parts?.[0]?.text;
          if (partText) {
            mergedText += partText;
            snippet = `+ "${partText.replace(/\n/g, '\\n')}"`;
          } else {
            snippet = 'metadata / usage / promptFeedback';
            typeClass = 'bg-amber-500/10 text-amber-300 border-amber-500/20';
          }

          frames.push({
            index,
            event: partText ? 'text_delta' : 'metadata',
            snippet,
            typeClass,
            payload: item
          });
        });
      }

      return { mergedText, frames };
    }

    // Render SSE Stream view
    function renderStreamView(container, arr, isClaude) {
      const { mergedText, frames } = compileStreamDetails(arr, isClaude);

      // Create AI Response Merged Preview Bubble
      const chatBubbleHtml = `
        <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-6 shadow-md relative">
          <div class="flex items-center justify-between mb-3 border-b border-slate-800/80 pb-2">
            <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-wider">
              <i data-lucide="bot" class="w-4 h-4 text-indigo-400"></i> AI Response Merged Preview
            </div>
            <button onclick="navigator.clipboard.writeText(\`${mergedText.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`).then(() => alert('Copied text!'))" class="text-xs text-slate-500 hover:text-white transition flex items-center gap-1">
              <i data-lucide="copy" class="w-3 h-3"></i> Copy Text
            </button>
          </div>
          <div class="whitespace-pre-wrap font-sans text-gray-200 text-sm leading-relaxed">${mergedText || '<span class="text-gray-500 italic">No text content returned in stream</span>'}</div>
        </div>
      `;

      // Timeline Title
      const timelineHeaderHtml = `
        <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
          <i data-lucide="git-commit" class="w-4 h-4"></i> Timeline Chunks (${frames.length} frames)
        </div>
      `;

      const timelineContainer = document.createElement('div');
      timelineContainer.className = 'space-y-2';

      frames.forEach(frame => {
        const row = document.createElement('div');
        row.className = 'bg-gray-900/30 border border-gray-800/50 rounded-lg overflow-hidden transition-all duration-150';

        row.innerHTML = `
          <div class="flex items-center justify-between px-4 py-2.5 cursor-pointer select-none hover:bg-gray-800/20" id="stream-row-trigger-${frame.index}">
            <div class="flex items-center gap-3 truncate">
              <span class="font-mono text-gray-600 text-[10px]">#${frame.index + 1}</span>
              <span class="text-[10px] px-2 py-0.5 rounded-full border font-semibold truncate ${frame.typeClass}">${frame.event}</span>
              <span class="font-mono text-xs text-gray-400 truncate">${frame.snippet}</span>
            </div>
            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-500 transition-transform duration-100 stream-arrow"></i>
          </div>
          <div class="hidden border-t border-gray-900 p-4 bg-gray-950/40" id="stream-row-content-${frame.index}"></div>
        `;

        // Interactive toggle nested payload tree
        const trigger = row.querySelector(`#stream-row-trigger-${frame.index}`);
        const content = row.querySelector(`#stream-row-content-${frame.index}`);
        const arrow = row.querySelector('.stream-arrow');

        let isRendered = false;
        trigger.onclick = () => {
          if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            arrow.style.transform = 'rotate(90deg)';
            if (!isRendered) {
              content.appendChild(createJsonNode(null, frame.payload, true, isClaude ? 'claude' : 'gemini'));
              isRendered = true;
            }
          } else {
            content.classList.add('hidden');
            arrow.style.transform = 'rotate(0deg)';
          }
        };

        timelineContainer.appendChild(row);
      });

      const wrapper = document.createElement('div');
      wrapper.innerHTML = chatBubbleHtml + timelineHeaderHtml;
      wrapper.appendChild(timelineContainer);
      container.appendChild(wrapper);

      lucide.createIcons();
    }

    function renderPayload() {
      const container = document.getElementById('payloadContainer');
      const compareContainer = document.getElementById('compareContainer');
      const leftBody = document.getElementById('compareLeftBody');
      const rightBody = document.getElementById('compareRightBody');

      if (!selectedLogData) return;

      if (activeTabs.primary === 'compare') {
        container.classList.add('hidden');
        compareContainer.classList.remove('hidden');

        leftBody.innerHTML = '';
        rightBody.innerHTML = '';

        const leftObj = activeTabs.direction === 'req' ? selectedLogData.client_req : selectedLogData.claude_res;
        const rightObj = activeTabs.direction === 'req' ? selectedLogData.gem_req : selectedLogData.gem_res;

        renderDualPane(leftBody, leftObj, 'claude');
        renderDualPane(rightBody, rightObj, 'gemini');
      } else {
        compareContainer.classList.add('hidden');
        container.classList.remove('hidden');

        const obj = getCurrentPayloadObject();

        if (!obj) {
          container.innerHTML = '<div class="text-gray-500 italic py-4">No content recorded for this section</div>';
          return;
        }

        if (activeTabs.format === 'raw') {
          container.innerHTML = `<pre class="bg-gray-950 p-4 border border-gray-800 rounded-lg text-gray-300 overflow-x-auto text-xs whitespace-pre">${JSON.stringify(obj, null, 2)}</pre>`;
        } else {
          container.innerHTML = '';
          const isClaude = isClaudeStream(obj);
          const isGemini = isGeminiStream(obj);

          if (isClaude || isGemini) {
            renderStreamView(container, obj, isClaude);
          } else {
            // Default single viewer
            container.appendChild(createJsonNode(null, obj, true, activeTabs.primary));
          }
        }
      }
    }

    // Collapsible JSON tree generator
    function createJsonNode(key, value, isLast, channelType = null) {
      const container = document.createElement('div');
      container.className = 'pl-4 py-0.5 border-l border-gray-900 hover:bg-gray-800/10 transition-colors relative font-mono text-xs text-gray-300';

      // Check special highlight annotations based on Channel (Claude vs Gemini)
      let highlightClass = '';
      let badgeHtml = '';

      if (key && channelType) {
        if (channelType === 'claude') {
          if (key === 'system') {
            highlightClass = 'bg-purple-950/10 border-l-2 border-purple-500 pl-1 rounded-r pr-2 py-0.5 shadow-sm shadow-purple-500/10';
            badgeHtml = ' <span class="bg-purple-500/15 text-purple-300 text-[9px] px-1.5 py-0.5 rounded ml-1 font-sans border border-purple-500/20 font-semibold">→ System Instruction</span>';
          } else if (key === 'tools') {
            highlightClass = 'bg-amber-950/10 border-l-2 border-amber-500 pl-1 rounded-r pr-2 py-0.5 shadow-sm shadow-amber-500/10';
            badgeHtml = ' <span class="bg-amber-500/15 text-amber-300 text-[9px] px-1.5 py-0.5 rounded ml-1 font-sans border border-amber-500/20 font-semibold">→ Tool Definitions</span>';
          }
        } else if (channelType === 'gemini') {
          if (key === 'systemInstruction') {
            highlightClass = 'bg-purple-950/10 border-l-2 border-purple-500 pl-1 rounded-r pr-2 py-0.5 shadow-sm shadow-purple-500/10';
            badgeHtml = ' <span class="bg-purple-500/15 text-purple-300 text-[9px] px-1.5 py-0.5 rounded ml-1 font-sans border border-purple-500/20 font-semibold">← System Wrapper</span>';
          } else if (key === 'functionDeclarations') {
            highlightClass = 'bg-amber-950/10 border-l-2 border-amber-500 pl-1 rounded-r pr-2 py-0.5 shadow-sm shadow-amber-500/10';
            badgeHtml = ' <span class="bg-amber-500/15 text-amber-300 text-[9px] px-1.5 py-0.5 rounded ml-1 font-sans border border-amber-500/20 font-semibold">← upperCase Schemas</span>';
          }
        }
      }

      // Add wrapper highlighting class if active
      if (highlightClass) {
        container.className += ' ' + highlightClass;
      }

      const keySpan = key ? `<span class="text-indigo-400">"${key}"</span>${badgeHtml}: ` : '';

      if (value === null) {
        container.innerHTML = `${keySpan}<span class="text-gray-500 font-bold">null</span>${isLast ? '' : ','}`;
      } else if (typeof value === 'object') {
        const isArray = Array.isArray(value);
        const size = isArray ? value.length : Object.keys(value).length;
        const bracketOpen = isArray ? '[' : '{';
        const bracketClose = isArray ? ']' : '}';

        const summarySpan = document.createElement('span');
        summarySpan.className = 'cursor-pointer select-none font-semibold hover:text-white flex items-center inline-flex';
        summarySpan.innerHTML = `
          <span class="mr-1 text-gray-500 text-[10px] transform transition-transform duration-100 collapse-arrow inline-block">▶</span>
          ${keySpan}${bracketOpen} <span class="text-[10px] text-gray-500 font-normal ml-1">(${size} ${isArray ? 'items' : 'keys'})</span>
        `;

        const childrenContainer = document.createElement('div');
        childrenContainer.className = 'hidden pl-4 border-l border-gray-800/50 mt-0.5 space-y-0.5';

        // Lazy-render children
        let rendered = false;
        summarySpan.onclick = () => {
          const arrow = summarySpan.querySelector('.collapse-arrow');
          if (childrenContainer.classList.contains('hidden')) {
            childrenContainer.classList.remove('hidden');
            arrow.style.transform = 'rotate(90deg)';
            if (!rendered) {
              const keys = Object.keys(value);
              keys.forEach((k, i) => {
                childrenContainer.appendChild(createJsonNode(isArray ? null : k, value[k], i === keys.length - 1, channelType));
              });
              rendered = true;
            }
          } else {
            childrenContainer.classList.add('hidden');
            arrow.style.transform = 'rotate(0deg)';
          }
        };

        const closingSpan = document.createElement('div');
        closingSpan.className = 'text-gray-400';
        closingSpan.innerHTML = `${bracketClose}${isLast ? '' : ','}`;

        container.appendChild(summarySpan);
        container.appendChild(childrenContainer);
        container.appendChild(closingSpan);

      } else {
        let valSpan = '';
        if (typeof value === 'string') {
          // Highlight string representation of system-reminder system instruction inside Gemini
          let stringHighlight = '';
          if (channelType === 'gemini' && value.includes('<system-reminder>')) {
            stringHighlight = 'bg-purple-950/20 px-1 py-0.5 rounded border border-purple-800/40 inline-block font-mono text-[11px]';
          }
          valSpan = `<span class="text-emerald-400 ${stringHighlight}">"${value.replace(/"/g, '\\"')}"</span>`;
        } else if (typeof value === 'number') {
          valSpan = `<span class="text-amber-500">${value}</span>`;
        } else if (typeof value === 'boolean') {
          valSpan = `<span class="text-orange-400 font-bold">${value}</span>`;
        }
        container.innerHTML = `${keySpan}${valSpan}${isLast ? '' : ','}`;
      }

      return container;
    }

    // Utility to copy current JSON
    function copyCurrentPayload() {
      const obj = getCurrentPayloadObject();
      if (!obj) return;
      navigator.clipboard.writeText(JSON.stringify(obj, null, 2)).then(() => {
        alert('Copied to clipboard!');
      });
    }

    // Init
    window.onload = () => {
      loadLogs();
      lucide.createIcons();
    };
  </script>
</body>
</html>
